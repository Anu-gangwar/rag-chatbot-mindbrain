<!DOCTYPE html>
<html>
<head>
    <title>MindBrain HR Chatbot</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; }
        #chat { border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 10px; }
       .user { color: blue; margin: 5px 0; }
       .bot { color: green; margin: 5px 0; }
        input { width: 80%; padding: 10px; }
        button { padding: 10px; }
    </style>
</head>
<body>
    <h2>MindBrain HR Policy Chatbot 🤖</h2>
    <div id="chat"></div>
    <input type="text" id="question" placeholder="Ask about leave policy, WFH, etc...">
    <button onclick="askQuestion()">Ask</button>

    <script>
        async function askQuestion() {
            const q = document.getElementById('question').value;
            document.getElementById('chat').innerHTML += `<div class="user"><b>You:</b> ${q}</div>`;
            document.getElementById('question').value = '';
            
            const res = await fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({question: q})
            });
            const data = await res.json();
            document.getElementById('chat').innerHTML += `<div class="bot"><b>Bot:</b> ${data.answer}</div>`;
        }
    </script>
</body>
</html>
